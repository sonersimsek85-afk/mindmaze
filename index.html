<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Alzheimer: Zihin Egzersizi</title>
    <style>
        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.5s ease;
        }

        #app {
            width: 100%;
            height: 100%;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
        }

        header {
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            letter-spacing: 4px;
            color: var(--neon-blue);
            text-shadow: var(--neon-glow);
            margin-bottom: 2px;
        }

        h2 {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            font-weight: 300;
            opacity: 0.8;
            letter-spacing: 2px;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            animation: fadeIn 0.5s ease;
            overflow: hidden;
        }

        .screen.active {
            display: flex;
        }

        /* Start Screen */
        .start-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            border: 2px solid var(--neon-blue);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
        }

        .btn {
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            box-shadow: var(--neon-glow);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.9);
        }

        /* Game Stats */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .stat-item span {
            color: var(--neon-blue);
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        #timer.warning {
            color: var(--accent-color);
            animation: pulse-red 1s infinite;
        }

        /* Game Grid */
        #game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(var(--card-size), 1fr));
            gap: 10px;
            justify-content: center;
            align-content: center;
            perspective: 1000px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
            overflow: hidden;
        }

        .card {
            width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            animation: explode 0.8s forwards;
            pointer-events: none;
        }

        .card.shake {
            animation: shake 0.4s ease;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: clamp(1rem, 5vw, 2.5rem);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .card-front {
            background: var(--card-back);
            border: 2px solid var(--neon-blue);
            box-shadow: inset 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .card-front::after {
            content: '?';
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .card-back {
            background: var(--card-back);
            transform: rotateY(180deg);
            border: 2px solid #fff;
        }

        /* Controls */
        .controls {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Result Screen */
        .result-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .final-score {
            font-size: 4rem;
            color: var(--neon-blue);
            margin: 20px 0;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes explode {
            0% { transform: scale(1) rotateY(180deg); opacity: 1; box-shadow: 0 0 0px #fff; filter: brightness(1); }
            30% { transform: scale(1.2) rotateY(180deg); opacity: 1; box-shadow: 0 0 40px #fff; filter: brightness(2); }
            100% { transform: scale(2) rotateY(180deg); opacity: 0; box-shadow: 0 0 100px #fff; filter: brightness(3); visibility: hidden; }
        }

        @keyframes shake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            25% { transform: rotateY(180deg) translateX(-10px); }
            75% { transform: rotateY(180deg) translateX(10px); }
        }

        @keyframes pulse-red {
            0% { transform: scale(1); text-shadow: 0 0 0px rgba(244, 63, 94, 0); }
            50% { transform: scale(1.1); text-shadow: 0 0 15px rgba(244, 63, 94, 0.8); }
            100% { transform: scale(1); text-shadow: 0 0 0px rgba(244, 63, 94, 0); }
        }

        /* Red Border Alert */
        .low-time-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 0px solid var(--accent-color);
            pointer-events: none;
            transition: border-width 0.5s;
            z-index: 9999;
        }

        .low-time .low-time-overlay {
            border-width: 10px;
            animation: border-pulse 1s infinite;
        }

        @keyframes border-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            #game-grid { gap: 5px; }
            .stats-bar { padding: 5px; }
        }
    </style>
    </style>
</head>
<body>
    <div class="low-time-overlay"></div>
    
    <div class="controls">
        <button class="control-btn" id="theme-toggle" title="Tema Değiştir">🌓</button>
    </div>

    <div id="app">
        <header>
            <h1>ANTİ-ALZHEİMER</h1>
            <h2>Zihin Egzersizi</h2>
        </header>

        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="start-container">
                <p>Zihnini genç tutmak için eşleri bul!</p>
                <input type="text" id="player-name" placeholder="İsminizi Yazın" maxlength="15">
                <button class="btn" id="start-btn">OYUNA BAŞLA</button>
                <div style="margin-top: 20px; font-size: 0.9rem; opacity: 0.7;">
                    En Yüksek Skor: <span id="global-high-score">0</span>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="stats-bar">
                <div class="stat-item">
                    <span>SEVİYE</span>
                    <div id="level-display">1</div>
                </div>
                <div class="stat-item">
                    <span>SÜRE</span>
                    <div id="timer">60</div>
                </div>
                <div class="stat-item">
                    <span>SKOR</span>
                    <div id="score-display">0</div>
                </div>
            </div>
            <div id="game-grid"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <div class="result-container">
                <h2 id="result-title">OYUN BİTTİ</h2>
                <p id="result-msg">Harika bir iş çıkardın!</p>
                <div class="final-score" id="final-score">0</div>
                <button class="btn" id="restart-btn">TEKRAR OYNA</button>
            </div>
        </div>
    </div>

    <script>
        // Game Configuration
        const LEVELS = [
            { cards: 4, rows: 2, cols: 2, time: 20 },
            { cards: 6, rows: 2, cols: 3, time: 30 },
            { cards: 8, rows: 2, cols: 4, time: 40 },
            { cards: 10, rows: 2, cols: 5, time: 50 },
            { cards: 12, rows: 3, cols: 4, time: 60 },
            { cards: 14, rows: 2, cols: 7, time: 70 },
            { cards: 16, rows: 4, cols: 4, time: 80 },
            { cards: 18, rows: 3, cols: 6, time: 90 },
            { cards: 20, rows: 4, cols: 5, time: 100 },
            { cards: 24, rows: 4, cols: 6, time: 120 }
        ];

        const EMOJIS = ['🧠', '🧬', '🍎', '🧩', '🧘', '💡', '🧪', '📱', '🔋', '💎', '🌈', '🎨', '🚀', '🎸', '⚽', '🍦'];

        // State
        let currentLevel = 0;
        let score = 0;
        let timeLeft = 0;
        let timerId = null;
        let flippedCards = [];
        let matchedPairs = 0;
        let canFlip = true;
        let playerName = "Oyuncu";

        // Sound System (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            switch(type) {
                case 'flip':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'match':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'error':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(50, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'win':
                    playMelody([523, 659, 783, 1046], 0.1);
                    break;
                case 'lose':
                    playMelody([300, 250, 200, 150], 0.2);
                    break;
                case 'level-up':
                    playMelody([440, 554, 659, 880], 0.15);
                    break;
            }
        }

        function playMelody(freqs, duration) {
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const start = audioCtx.currentTime + (i * duration);
                osc.frequency.setValueAtTime(f, start);
                gain.gain.setValueAtTime(0.1, start);
                gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
                osc.start(start);
                osc.stop(start + duration);
            });
        }

        // DOM Elements
        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('game-screen'),
            result: document.getElementById('result-screen')
        };
        const grid = document.getElementById('game-grid');
        const timerDisplay = document.getElementById('timer');
        const scoreDisplay = document.getElementById('score-display');
        const levelDisplay = document.getElementById('level-display');
        const finalScoreDisplay = document.getElementById('final-score');
        const playerNameInput = document.getElementById('player-name');
        const highScoreDisplay = document.getElementById('global-high-score');

        // Initial High Score Load
        highScoreDisplay.textContent = localStorage.getItem('alzGameHighScore') || 0;

        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
        });

        // Start Game
        document.getElementById('start-btn').addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playerName = playerNameInput.value.trim() || "Oyuncu";
            startGame();
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            currentLevel = 0;
            score = 0;
            startGame();
        });

        function showScreen(screenId) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenId].classList.add('active');
        }

        function startGame() {
            showScreen('game');
            loadLevel();
        }

        function loadLevel() {
            const levelData = LEVELS[currentLevel];
            grid.innerHTML = '';
            
            // Adjust card size for many cards to fit on screen
            if (levelData.cards > 16) {
                document.documentElement.style.setProperty('--card-size', '65px');
            } else if (levelData.cards > 8) {
                document.documentElement.style.setProperty('--card-size', '85px');
            } else {
                document.documentElement.style.setProperty('--card-size', '110px');
            }

            matchedPairs = 0;
            flippedCards = [];
            canFlip = true;
            timeLeft = levelData.time;
            
            updateStats();
            createCards(levelData.cards);
            startTimer();
        }

        function createCards(count) {
            const pairCount = count / 2;
            const levelEmojis = EMOJIS.slice(0, pairCount);
            const cardValues = [...levelEmojis, ...levelEmojis];
            
            // Shuffle
            for (let i = cardValues.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cardValues[i], cardValues[j]] = [cardValues[j], cardValues[i]];
            }

            cardValues.forEach((val, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.value = val;
                card.innerHTML = `
                    <div class="card-face card-front"></div>
                    <div class="card-back card-face">${val}</div>
                `;
                card.addEventListener('click', () => flipCard(card));
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            playSound('flip');
            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.value === card2.dataset.value;

            if (isMatch) {
                matchedPairs++;
                score += (currentLevel + 1) * 10 + (timeLeft > 0 ? timeLeft : 0);
                card1.classList.add('matched');
                card2.classList.add('matched');
                playSound('match');
                flippedCards = [];
                canFlip = true;
                updateStats();

                if (matchedPairs === LEVELS[currentLevel].cards / 2) {
                    levelComplete();
                }
            } else {
                playSound('error');
                card1.classList.add('shake');
                card2.classList.add('shake');
                setTimeout(() => {
                    card1.classList.remove('flipped', 'shake');
                    card2.classList.remove('flipped', 'shake');
                    flippedCards = [];
                    canFlip = true;
                }, 800);
            }
        }

        function levelComplete() {
            clearInterval(timerId);
            if (currentLevel < LEVELS.length - 1) {
                playSound('level-up');
                setTimeout(() => {
                    currentLevel++;
                    loadLevel();
                }, 1000);
            } else {
                endGame(true);
            }
        }

        function startTimer() {
            clearInterval(timerId);
            document.body.classList.remove('low-time');
            timerDisplay.classList.remove('warning');

            timerId = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;

                if (timeLeft <= 10) {
                    timerDisplay.classList.add('warning');
                    document.body.classList.add('low-time');
                }

                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function updateStats() {
            scoreDisplay.textContent = score;
            levelDisplay.textContent = currentLevel + 1;
            timerDisplay.textContent = timeLeft;
        }

        function endGame(isWin) {
            clearInterval(timerId);
            document.body.classList.remove('low-time');
            
            if (isWin) {
                playSound('win');
                document.getElementById('result-title').textContent = "TEBRİKLER!";
                document.getElementById('result-msg').textContent = `${playerName}, tüm seviyeleri başarıyla tamamladın!`;
            } else {
                playSound('lose');
                document.getElementById('result-title').textContent = "SÜRE BİTTİ";
                document.getElementById('result-msg').textContent = `${playerName}, zihnini geliştirmeye devam et!`;
            }

            finalScoreDisplay.textContent = score;
            
            // High Score Check
            const currentHighScore = localStorage.getItem('alzGameHighScore') || 0;
            if (score > currentHighScore) {
                localStorage.setItem('alzGameHighScore', score);
                highScoreDisplay.textContent = score;
            }

            showScreen('result');
        }
    </script>
</body>
</html>
